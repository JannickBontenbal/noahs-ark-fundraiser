<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Contact opnemen met het Guido de Bres x Noah's Ark fundraiser team.">
  <title>Contact - Noah's Ark Fundraiser</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,600..900,0..100,0..1&family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: #080806;
      --surface-strong: #f8efd8;
      --text-primary: #fff8e8;
      --text-muted: rgba(255, 248, 232, 0.66);
      --ink: #080806;
      --border: rgba(255, 248, 232, 0.18);
      --acid: #d9ff3f;
      --coral: #ff5a3d;
      --sky: #77e7ff;
      --display: "Fraunces", Georgia, serif;
      --body: "Inter Tight", system-ui, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; }

    html {
      background: var(--background);
      color-scheme: dark;
    }

    body {
      min-width: 320px;
      margin: 0;
      background:
        linear-gradient(90deg, rgba(255, 248, 232, 0.045) 1px, transparent 1px) 0 0 / 74px 74px,
        linear-gradient(0deg, rgba(255, 248, 232, 0.035) 1px, transparent 1px) 0 0 / 74px 74px,
        repeating-linear-gradient(135deg, rgba(217, 255, 63, 0.045) 0 1px, transparent 1px 16px),
        var(--background);
      color: var(--text-primary);
      font-family: var(--body);
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }

    button,
    input,
    textarea {
      font: inherit;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      padding: 16px clamp(18px, 3.3vw, 46px);
      border-bottom: 1px solid var(--border);
      background: rgba(8, 8, 6, 0.76);
      backdrop-filter: blur(18px);
    }

    .logo,
    .kicker,
    label,
    .form-message {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .logo {
      display: grid;
      gap: 2px;
      font-size: 12px;
      line-height: 1.05;
    }

    .logo span,
    .kicker {
      color: var(--acid);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border: 1px solid rgba(255, 248, 232, 0.34);
      border-radius: 4px;
      background: rgba(255, 248, 232, 0.03);
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
    }

    .button:hover,
    .button:focus-visible {
      border-color: var(--acid);
      color: var(--acid);
      outline: 0;
    }

    .button.dark {
      border-color: var(--ink);
      background: var(--ink);
      color: var(--text-primary);
    }

    main {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: clamp(38px, 7vw, 92px) clamp(18px, 3.3vw, 46px) 90px;
    }

    .hero {
      margin-bottom: 28px;
    }

    h1 {
      max-width: 850px;
      margin: 12px 0 0;
      font-size: clamp(52px, 8vw, 118px);
      font-weight: 900;
      line-height: 0.82;
      text-transform: uppercase;
    }

    h1 em {
      color: var(--acid);
      font-family: var(--display);
      font-style: italic;
      font-variation-settings: "SOFT" 80, "WONK" 1;
      text-transform: none;
    }

    .panel {
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--surface-strong);
      color: var(--ink);
      box-shadow: 12px 12px 0 var(--sky);
      overflow: hidden;
    }

    .panel-head {
      padding: 22px;
      border-bottom: 1px solid rgba(8, 8, 6, 0.18);
    }

    .panel-head p {
      margin: 6px 0 0;
      color: rgba(8, 8, 6, 0.66);
      font-weight: 750;
    }

    form {
      display: grid;
      gap: 14px;
      padding: 22px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    input,
    textarea {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid rgba(8, 8, 6, 0.18);
      border-radius: 6px;
      background: rgba(8, 8, 6, 0.045);
      color: var(--ink);
      outline: 0;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--coral);
      box-shadow: 0 0 0 3px rgba(255, 90, 61, 0.16);
    }

    .form-message {
      min-height: 22px;
      margin: 0;
      color: #005b6b;
    }

    .form-message.error {
      color: var(--coral);
    }

    @media (max-width: 700px) {
      .nav {
        display: grid;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <nav class="nav" aria-label="Hoofdnavigatie">
    <a class="logo" href="index.html">
      Guido de Br&egrave;s
      <span>x Noah's Ark</span>
    </a>
    <a class="button" href="index.html">Terug naar site</a>
  </nav>

  <main>
    <section class="hero">
      <p class="kicker">Contact</p>
      <h1>Stuur een <em>bericht</em></h1>
    </section>

    <section class="panel" aria-labelledby="contact-heading">
      <div class="panel-head">
        <h2 id="contact-heading">Contactformulier</h2>
        <p>Vragen over de actie, donaties of formulieren komen bij het team binnen.</p>
      </div>
      <form id="contact-form">
        <div class="field">
          <label for="contact-name">Naam</label>
          <input id="contact-name" name="name" type="text" autocomplete="name" required>
        </div>
        <div class="field">
          <label for="contact-email">E-mail</label>
          <input id="contact-email" name="email" type="email" autocomplete="email">
        </div>
        <div class="field">
          <label for="contact-subject">Onderwerp</label>
          <input id="contact-subject" name="subject" type="text">
        </div>
        <div class="field">
          <label for="contact-message">Bericht</label>
          <textarea id="contact-message" name="message" required></textarea>
        </div>
        <div>
          <button class="button dark" type="submit">Verstuur</button>
        </div>
        <p class="form-message" id="contact-status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="config.js"></script>
  <script>
    (function () {
      "use strict";

      var config = window.NAF_CONFIG || {};
      var apiBase = cleanUrl(config.ADMIN_API_URL || "");
      var form = document.getElementById("contact-form");
      var status = document.getElementById("contact-status");

      form.addEventListener("submit", handleSubmit);

      function cleanUrl(url) {
        return String(url || "").replace(/\/+$/, "");
      }

      function apiPath(path) {
        return (apiBase || "") + path;
      }

      async function handleSubmit(event) {
        event.preventDefault();
        status.className = "form-message";
        status.textContent = "Versturen...";
        var button = form.querySelector("button[type='submit']");
        var originalText = button.textContent;

        try {
          button.disabled = true;
          button.textContent = "Versturen...";
          var response = await fetch(apiPath("/api/contact-messages"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: form.name.value.trim(),
              email: form.email.value.trim(),
              subject: form.subject.value.trim(),
              message: form.message.value.trim()
            })
          });
          if (!response.ok) {
            throw await httpError(response, "Bericht kon niet worden verstuurd.");
          }
          form.reset();
          status.textContent = "Bericht verstuurd.";
        } catch (error) {
          status.className = "form-message error";
          status.textContent = error.message || "Bericht kon niet worden verstuurd.";
        } finally {
          button.disabled = false;
          button.textContent = originalText;
        }
      }

      async function httpError(response, fallback) {
        var message = fallback;
        try {
          var body = await response.json();
          message = body.error || message;
        } catch (error) {
          message = response.statusText || message;
        }
        return new Error(message);
      }
    })();
  </script>
</body>
</html>
